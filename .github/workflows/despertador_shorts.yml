name: 1. Usina Shorts (PL)

on:
  schedule:
    - cron: '0 1 * * *' # 03:00 Warsaw (winter) / 02:00 (summer)
  workflow_dispatch:

jobs:
  produzir_shorts:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: pip install google-genai gspread
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_PL: ${{ secrets.GOOGLE_CREDENTIALS_PL }}
        run: python usina_shorts.py

