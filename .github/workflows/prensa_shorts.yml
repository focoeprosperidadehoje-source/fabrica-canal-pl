name: 2. Prensa Shorts (Matrix EN)

on:
  schedule:
    - cron: '30 15 * * *' # 11:30 ET
    - cron: '30 16 * * *' # 12:30 ET
  workflow_dispatch:

jobs:
  renderizar_shorts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        horario:
          - '14:00'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
      - run: pip install --upgrade google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS_EN: ${{ secrets.GOOGLE_CREDENTIALS_EN }}
          YOUTUBE_TOKEN_EN_SHORTS: ${{ secrets.YOUTUBE_TOKEN_EN_SHORTS }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador_shorts.py

