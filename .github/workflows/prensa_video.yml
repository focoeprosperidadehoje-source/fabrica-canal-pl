name: 2. Prensa Longos (Matrix PL)

on:
  schedule:
    - cron: '30 3 * * *'  # 05:30 Warsaw (winter) -> publica as 06:00
    - cron: '30 4 * * *'  # 06:30 Warsaw (winter) -> backup
    - cron: '30 14 * * *' # 16:30 Warsaw (winter) -> publica as 18:00
    - cron: '30 15 * * *' # 17:30 Warsaw (winter) -> backup
  workflow_dispatch:

jobs:
  renderizar_e_publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        horario:
          - '06:00'
          - '18:00'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          wget -q -O Anton.ttf https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf
      - run: pip install --upgrade google-api-python-client google-auth-oauthlib google-auth-httplib2 Pillow gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS_PL: ${{ secrets.GOOGLE_CREDENTIALS_PL }}
          YOUTUBE_TOKEN_PL: ${{ secrets.YOUTUBE_TOKEN_PL }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador.py

