name: 2. Prensa Longos (Matrix EN)

on:
  schedule:
    - cron: '30 8 * * *'  # 04:30 ET
    - cron: '30 9 * * *'  # 05:30 ET
    - cron: '30 20 * * *' # 16:30 ET
    - cron: '30 21 * * *' # 17:30 ET
  workflow_dispatch:

jobs:
  renderizar_e_publicar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        horario:
          - '06:00'
          - '18:00'
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: |
          sudo apt-get update -y || true
          sudo apt-get install -y ffmpeg
          wget -q -O Anton.ttf https://github.com/google/fonts/raw/main/ofl/anton/Anton-Regular.ttf
      - run: pip install --upgrade google-api-python-client google-auth-oauthlib google-auth-httplib2 Pillow gspread pytz edge-tts
      - env:
          GOOGLE_CREDENTIALS_EN: ${{ secrets.GOOGLE_CREDENTIALS_EN }}
          YOUTUBE_TOKEN_EN: ${{ secrets.YOUTUBE_TOKEN_EN }}
          HORARIO_ALVO: ${{ matrix.horario }}
        run: python publicador.py

