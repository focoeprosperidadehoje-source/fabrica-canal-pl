name: 1. Usina Longos (EN)

on:
  schedule:
    - cron: '30 1 * * *' # 21:30 ET (prev day)
    - cron: '30 2 * * *' # 22:30 ET (prev day)
    - cron: '30 3 * * *' # 23:30 ET (prev day)
  workflow_dispatch:

jobs:
  produzir_videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: pip install --upgrade google-genai gspread
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_EN: ${{ secrets.GOOGLE_CREDENTIALS_EN }}
        run: python usina.py

