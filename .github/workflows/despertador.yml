name: 1. Usina Longos (PL)

on:
  schedule:
    - cron: '30 0 * * *' # 02:30 Warsaw (winter) / 01:30 (summer)
    - cron: '30 1 * * *' # 03:30 Warsaw (winter) / 02:30 (summer)
    - cron: '30 2 * * *' # 04:30 Warsaw (winter) / 03:30 (summer)
  workflow_dispatch:

jobs:
  produzir_videos:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3'
      - run: pip install --upgrade google-genai gspread
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_PL: ${{ secrets.GOOGLE_CREDENTIALS_PL }}
        run: python usina.py

