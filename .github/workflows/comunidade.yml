name: 3. Comunidade e Vendas (PL)

on:
  schedule:
    - cron: '30 6 * * *'  # 08:30 Warsaw (winter) / 07:30 (summer)
    - cron: '30 16 * * *' # 18:30 Warsaw (winter) / 17:30 (summer)
  workflow_dispatch:

jobs:
  interagir:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3'
      - run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 gspread google-genai
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_PL: ${{ secrets.GOOGLE_CREDENTIALS_PL }}
          YOUTUBE_TOKEN_PL: ${{ secrets.YOUTUBE_TOKEN_PL }}
        run: python comunidade.py
